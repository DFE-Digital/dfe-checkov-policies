name: Build and Publish Checkov Images

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions: { }

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Need: Push GitHub Tag
      packages: write # Need: Push GHCR
    strategy:
      fail-fast: false
      matrix:
        platform: [ "elz", "cip" ]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: true # Need: Push GitHub Tag

      - name: Lowercase Repository Name
        id: lowercase
        uses: ./.github/actions/lowercase
        with:
          value: ${{ github.repository }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute Checksum & Determine Build
        id: checksum
        run: |
          CHECKSUM=$(
            find ./docker/Dockerfile ./docker/entrypoint.sh ./policies/common ./policies/$PLATFORM -type f -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            | cut -d " " -f 1 \
            | sha256sum \
            | cut -d " " -f 1
          )
          
          IMAGE="ghcr.io/$REPOSITORY/checkov-$PLATFORM:$CHECKSUM"
          
          if docker buildx imagetools inspect "$IMAGE" > /dev/null 2>&1; then
            echo "Checksum: $CHECKSUM"
            echo "Image with Checksum Already Exists, Skipping Build & Publish.."
            BUILD="false"
          else
            echo "Checksum: $CHECKSUM"
            echo "Image with Checksum Does Not Exist, Building & Publishing.."
            BUILD="true"
          fi
          
          echo "checksum=$CHECKSUM" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT
        env:
          PLATFORM: ${{ matrix.platform }}
          REPOSITORY: ${{ steps.lowercase.outputs.lowercased_value }}

      - name: Compute Version
        id: version
        if: ${{ steps.checksum.outputs.build == 'true' }}
        run: |
          PREFIX=${PLATFORM^^}
          MAJOR=$(date +%Y)
          MINOR=$(date +%m)
          PATCH=0
          
          LATEST=$(git tag -l "$PREFIX-$MAJOR.$MINOR.*" --sort=-version:refname | head -n 1)
          
          if [[ -n "$LATEST" ]]; then
            PATCH=$(( ${LATEST##*.} + 1 ))
          fi
          
          VERSION="$PREFIX-$MAJOR.$MINOR.$PATCH"
          
          echo "Version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        env:
          PLATFORM: ${{ matrix.platform }}

      - name: Tag GitHub Repository
        if: ${{ steps.checksum.outputs.build == 'true' }}
        run: |
          git tag $VERSION
          git push origin $VERSION
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Build & Push Checkov Image
        if: ${{ steps.checksum.outputs.build == 'true' }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          file: ./docker/Dockerfile
          target: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/${{ steps.lowercase.outputs.lowercased_value }}/checkov-${{ matrix.platform }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ steps.lowercase.outputs.lowercased_value }}/checkov-${{ matrix.platform }}:${{ steps.checksum.outputs.checksum }}
            ghcr.io/${{ steps.lowercase.outputs.lowercased_value }}/checkov-${{ matrix.platform }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

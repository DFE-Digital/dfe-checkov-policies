name: Build and Publish Checkov Images

on:
  workflow_dispatch:
    inputs:
      build_elz:
        description: "Build and publish the ELZ image"
        type: boolean
        required: true
        default: true

      build_cip:
        description: "Build and publish the CIP image"
        type: boolean
        required: true
        default: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: ${{ inputs.build_elz || inputs.build_cip }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Lowercase Repository Name
        id: lowercase
        uses: ./.github/actions/lowercase
        with:
          value: ${{ github.repository }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f954fe3aa2a288455cfec6e27a1f502c298ec2c6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@343f7c4344506bcbf22a441af401e54b28d22223
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Checkov ELZ Image
        if: ${{ inputs.build_elz }}
        uses: docker/build-push-action@0a978131d200d6f218c600414069c4486815622c
        with:
          context: .
          file: ./docker/Dockerfile
          target: elz
          push: true
          tags: |
            ghcr.io/${{ steps.lowercase.outputs.lowercased_value }}/checkov-elz:${{ github.sha }}
            ghcr.io/${{ steps.lowercase.outputs.lowercased_value }}/checkov-elz:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Checkov CIP Image
        if: ${{ inputs.build_cip }}
        uses: docker/build-push-action@0a978131d200d6f218c600414069c4486815622c
        with:
          context: .
          file: ./docker/Dockerfile
          target: cip
          push: true
          tags: |
            ghcr.io/${{ steps.lowercase.outputs.lowercased_value }}/checkov-cip:${{ github.sha }}
            ghcr.io/${{ steps.lowercase.outputs.lowercased_value }}/checkov-cip:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
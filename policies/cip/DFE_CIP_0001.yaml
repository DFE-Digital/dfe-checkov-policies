metadata:
  name: "Enforce all resources have correct location"
  id: "DFE_CIP_0001"
  category: "GOVERNANCE"
definition:
  or:
    - cond_type: "attribute"
      resource_types:
        - "all"
      attribute: "location"
      operator: "not_exists"
    - cond_type: "attribute"
      resource_types:
        - "all"
      attribute: "location"
      operator: "within"
      value:
        - "westeurope"
        - "northeurope"
        - "West Europe"
        - "North Europe"
metadata:
  name: "Ensure Resource Groups have a Consumption Budget"
  id: "DFE_CMN_0008"
  category: "LOGGING"
definition:
  and:
    - cond_type: "filter"
      attribute: "resource_type"
      operator: "within"
      value:
        - "azurerm_resource_group"
    - cond_type: "connection"
      resource_types:
        - "azurerm_resource_group"
      connected_resource_types:
        - "azurerm_consumption_budget_resource_group"
      operator: "exists"
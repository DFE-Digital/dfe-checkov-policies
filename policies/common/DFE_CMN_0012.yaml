metadata:
  name: "Ensure Azure Storage Accounts have Lifecycle Rules"
  id: "DFE_CMN_0012"
  category: "GENERAL_SECURITY"
definition:
  and:
    - cond_type: "filter"
      attribute: "resource_type"
      operator: "within"
      value:
        - "azurerm_storage_account"
    - cond_type: "connection"
      resource_types:
        - "azurerm_storage_account"
      connected_resource_types:
        - "azurerm_storage_management_policy"
      operator: "exists"
    - cond_type: "attribute"
      resource_types:
        - "azurerm_storage_management_policy"
      attribute: "rule"
      operator: "exists"  